<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POST Demo (Mock)</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="container">

  <h1>POST Demo <span style="color:var(--green-light)">(Mock)</span></h1>

  <!-- API URL -->
  <div class="url-card">
    <div class="form">
      <label>API Base URL (Mock)</label>
      <input type="text" [(ngModel)]="apiBaseUrl" placeholder="https://api.jsoning.com/mock/TOKEN/" />
    </div>
  </div>

  <!-- Álbum -->
  <div class="card">
    <span class="section-label">Álbum</span>
    <div class="form">
      <label>ID</label>
      <input type="text" [(ngModel)]="form.id" placeholder="ID del álbum..." />

      <label>Nombre del Álbum</label>
      <input type="text" [(ngModel)]="form.name" placeholder="Nombre del álbum..." />

      <label>Artista</label>
      <input type="text" [(ngModel)]="form.artist" placeholder="Nombre del artista..." />

      <label>Año</label>
      <input type="number" [(ngModel)]="form.year" placeholder="Año de lanzamiento..." />

      <label>Tracks</label>
      <input type="text" [(ngModel)]="tracksInput" placeholder="Track 1, Track 2, Track 3..." />
      <small>Ingresa los tracks separados por coma</small>

      <button (click)="sendPost()" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar POST' }}
      </button>
      <p *ngIf="albumMessage" class="error">{{ albumMessage }}</p>
    </div>
  </div>

  <!-- Artista -->
  <div class="card">
    <span class="section-label">Artista</span>
    <h2>Crear Artista</h2>
    <div class="form">
      <label>ID</label>
      <input type="text" [(ngModel)]="artistForm.id" placeholder="ID del artista..." />

      <label>Nombre</label>
      <input type="text" [(ngModel)]="artistForm.name" placeholder="Nombre del artista..." />

      <label>Status</label>
      <input type="text" [(ngModel)]="artistForm.status" placeholder="Estatus del artista [Activo/Inactivo]..." />

      <label>Género</label>
      <input type="text" [(ngModel)]="artistForm.genre" placeholder="Género del artista..." />

      <button (click)="sendArtist()" [disabled]="loading">Crear Artista</button>
      <p *ngIf="artistMessage" class="error">{{ artistMessage }}</p>
    </div>
  </div>

  <!-- Género -->
  <div class="card">
    <span class="section-label">Género</span>
    <h2>Crear Género</h2>
    <div class="form">
      <label>ID</label>
      <input type="text" [(ngModel)]="genreForm.id" placeholder="ID del Género..." />

      <label>Nombre</label>
      <input type="text" [(ngModel)]="genreForm.name" placeholder="Nombre del género..." />

      <label>País de Origen</label>
      <input type="text" [(ngModel)]="genreForm.origin_Country" placeholder="País de origen..." />

      <button (click)="sendGenre()" [disabled]="loading">Crear Género</button>
      <p *ngIf="genreMessage" class="error">{{ genreMessage }}</p>
    </div>
  </div>

</div>
</body>
</html>
